{{define "product"}}
{{template "layout" .}}
{{end}}

{{define "product.content"}}
<div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-8">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Product / Service List</h1>
        <p class="text-gray-500 mt-2">Add product or service details</p>
    </div>

    <!-- Form -->
    <form class="space-y-6" method="post" action="/product/add">

        <!-- Product Name -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Product Name
            </label>
            <input type="text" name="product" placeholder="Enter product name"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- Price -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Price (₹)
            </label>
            <input type="number" name="price" placeholder="Enter price"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- GST Rate -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                GST Rate
            </label>
            <select
                class="w-full rounded-xl border border-gray-300 px-4 py-3 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                name="gst">

                <option value="0">0%</option>
                <option value="5">5%</option>
                <option value="12">12%</option>
                <option value="18">18%</option>
                <option value="28">28%</option>

            </select>
        </div>

        <!-- Buttons -->
        <div class="flex items-center justify-end gap-4 pt-4">

            <button type="button"
                class="px-6 py-3 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-100 transition">
                Cancel
            </button>

            <button type="submit"
                class="px-6 py-3 rounded-xl bg-blue-600 text-white hover:bg-blue-700 transition shadow-md">
                Save Product
            </button>

        </div>

    </form>



    <h1 class="text-2xl font-bold mb-4">Products</h1>

    <table class="w-full border">
        <thead>
            <tr class="bg-gray-200">
                <th class="border p-2">ID</th>
                <th class="border p-2">Name</th>
                <th class="border p-2">Price</th>
                <th class="border p-2">GSTIN</th>
            </tr>
        </thead>

        <tbody>
            {{range .Products}}
            <tr>
                <td class="border p-2">{{.ID}}</td>
                <td class="border p-2">{{.Product}}</td>
                <td class="border p-2">{{.Price}}</td>
                <td class="border p-2">{{.GST}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>

</div>
{{end}}
