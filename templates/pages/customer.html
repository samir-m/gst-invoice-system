{{define "customer"}}
{{template "layout" .}}
{{end}}

{{define "customer.content"}}
<div class="w-full max-w-3xl bg-white rounded-2xl shadow-lg p-8">

    <!-- Header -->
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Customer Management</h1>
        <p class="text-gray-500 mt-2">Add customer details below</p>
    </div>

    <!-- Form -->
    <form class="space-y-6" method="POST" action="/customer/add">

        <!-- Customer Name -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Customer Name
            </label>
            <input type="text" name="customer_name" placeholder="Enter customer name"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- Phone Number -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Phone Number
            </label>
            <input type="tel" name="phone_number" placeholder="Enter phone number"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- Address -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                Address
            </label>
            <textarea rows="4" name="address" placeholder="Enter address"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
        </div>

        <!-- GSTIN -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
                GSTIN <span class="text-gray-400">(Optional)</span>
            </label>
            <input type="text" name="gstin" placeholder="Enter GSTIN"
                class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
        </div>

        <!-- Buttons -->
        <div class="flex items-center justify-end gap-4 pt-4">
            <button type="button"
                class="px-6 py-3 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-100 transition">
                Cancel
            </button>

            <button type="submit"
                class="px-6 py-3 rounded-xl bg-blue-600 text-white hover:bg-blue-700 transition shadow-md">
                Save Customer
            </button>
        </div>

    </form>

    <h1 class="text-2xl font-bold mb-4">Customers</h1>

    <table class="w-full border">
        <thead>
            <tr class="bg-gray-200">
                <th class="border p-2">ID</th>
                <th class="border p-2">Name</th>
                <th class="border p-2">Phone</th>
                <th class="border p-2">GSTIN</th>
            </tr>
        </thead>

        <tbody>
            {{range .Customers}}
            <tr>
                <td class="border p-2">{{.ID}}</td>
                <td class="border p-2">{{.Name}}</td>
                <td class="border p-2">{{.Phone}}</td>
                <td class="border p-2">{{.GSTIN}}</td>
            </tr>
            {{end}}
        </tbody>
    </table>

</div>
{{end}}
