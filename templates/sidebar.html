{{define "sidebar"}}
<div class="w-72 min-h-screen bg-gray-900 text-white flex flex-col">

    <div class="px-6 py-5 border-b border-gray-800">
        <h1 class="text-2xl font-bold">Invoice System</h1>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-2">

        <a href="/customer" class='block p-3 hover:bg-blue-600 rounded {{if eq .Page "customer"}}
               bg-blue-600
           {{else}}
               hover:bg-blue-600
           {{end}}'>
            Customer Management
        </a>

        <a href="/product" class=' block p-3 hover:bg-blue-600 rounded {{if eq .Page "product" }} bg-blue-600 {{else}}
            hover:bg-blue-600 {{end}}'>
            Product / Service List
        </a>

        <a href="/invoice" class='block p-3 hover:bg-blue-600 rounded {{if eq .Page "invoice"}}
               bg-blue-600
           {{else}}
               hover:bg-blue-600
           {{end}}'>
            Invoice
        </a>

    </nav>

</div>
{{end}}
